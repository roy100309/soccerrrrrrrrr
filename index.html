<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Babylon.js 11v11 Realistic Tactical Soccer</title>
  <style>
    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #87CEEB;
    }
    #renderCanvas {
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-family: 'Malgun Gothic', sans-serif;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px 20px;
      border-radius: 10px;
      pointer-events: none;
      line-height: 1.6;
      z-index: 10;
      border: 1px solid #1976d2;
    }
    #scoreboard {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #333;
      font-family: 'Arial', sans-serif;
      font-size: 24px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.95);
      padding: 10px 40px;
      border-radius: 30px;
      border: 2px solid #ccc;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      pointer-events: none;
      z-index: 10;
    }
    .score-team { display: inline-block; width: 90px; text-align: center; }
    #home-name { color: #1976d2; } 
    #away-name { color: #d32f2f; } 
    #score-text { font-size: 28px; color: #222; margin: 0 15px; }

    #power-bar-container {
      margin-top: 10px;
      width: 200px;
      height: 15px;
      background-color: #333;
      border-radius: 5px;
      overflow: hidden;
      display: none;
    }
    #power-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(to right, #4caf50, #ffeb3b, #f44336);
    }
    #goal-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffeb3b;
      font-family: 'Arial Black', sans-serif;
      font-size: 84px;
      font-weight: bold;
      text-shadow: 5px 5px 0px #000, -5px -5px 0px #000, 5px -5px 0px #000, -5px 5px 0px #000;
      display: none;
      pointer-events: none;
      z-index: 20;
      animation: pop 0.4s ease-in-out infinite alternate;
    }
    @keyframes pop {
      from { transform: translate(-50%, -50%) scale(0.95); }
      to { transform: translate(-50%, -50%) scale(1.05); }
    }
    .highlight { color: #ff3333; font-weight: bold; }
    .system-ready { color: #4caf50; font-weight: bold; }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>

  <div id="ui-container">
    ⚽ <b>리얼리스틱 11v11 전술 매치 시스템 (v4.1)</b><br>
    • 스케일: <span class="system-ready">경기장 및 선수 크기 대폭 상향</span><br>
    • 템포: 무작정 뛰는 속도 조절, 리얼한 전술 빌드업 페이스<br>
    • 조작: 화살표 키 / E (대시) / D (D슛 차징) / <span class="highlight">S (정면 아군 패스)</span><br>
    • 수비: 상대 마크맨 근접 시 <span class="system-ready">Spacebar</span> 연타로 밀착 태클 가로채기
    <div id="power-bar-container">
      <div id="power-bar"></div>
    </div>
  </div>
  
  <div id="scoreboard">
    <span class="score-team" id="home-name">HOME</span>
    <span id="score-text"><span id="score-home">0</span> : <span id="score-away">0</span></span>
    <span class="score-team" id="away-name">AWAY</span>
  </div>
  
  <div id="goal-overlay">GOAL!!!</div>
  
  <canvas id="renderCanvas"></canvas>

  <script>
    // 네임스페이스 안전성 보장 (일부 브라우저 모듈 스코프 에러 수정)
    const Engine = BABYLON.Engine;
    const Scene = BABYLON.Scene;
    const FreeCamera = BABYLON.FreeCamera;
    const Vector3 = BABYLON.Vector3;
    const HemisphericLight = BABYLON.HemisphericLight;
    const DirectionalLight = BABYLON.DirectionalLight;
    const MeshBuilder = BABYLON.MeshBuilder;
    const StandardMaterial = BABYLON.StandardMaterial;
    const Color3 = BABYLON.Color3;
    const DynamicTexture = BABYLON.DynamicTexture;

    // ==========================================
    // 대폭 상향된 월드 스케일 상수 설정
    // ==========================================
    const PLAYER_SCALE = 2.4; 
    const BALL_RADIUS = 0.95;  
    const PENALTY_BOX_W = 120; 
    const PENALTY_BOX_D = 70; 

    let gameInstance = null;

    // 인체 구조화 소재(Material) 캐싱 및 통합 관리
    function createHumanMaterials(scene) {
      const mats = {};
      mats.skin = new StandardMaterial("skin", scene); mats.skin.diffuseColor = new Color3(0.95, 0.79, 0.69);
      mats.hair = new StandardMaterial("hair", scene); mats.hair.diffuseColor = new Color3(0.18, 0.13, 0.1);
      mats.eyes = new StandardMaterial("eyes", scene); mats.eyes.diffuseColor = new Color3(0.1, 0.1, 0.1);
      mats.socks = new StandardMaterial("socks", scene); mats.socks.diffuseColor = new Color3(0.95, 0.95, 0.95);
      mats.boots = new StandardMaterial("boots", scene); mats.boots.diffuseColor = new Color3(0.1, 0.1, 0.1);
      mats.gkHome = new StandardMaterial("gkHome", scene); mats.gkHome.diffuseColor = new Color3(0.8, 0.85, 0.1);
      mats.gkAway = new StandardMaterial("gkAway", scene); mats.gkAway.diffuseColor = new Color3(0.6, 0.1, 0.6);

      // 홈 유니폼 - 세련된 네이비 스트라이프 텍스처 생성
      const texHome = new DynamicTexture("texHome", {width:256, height:256}, scene);
      const ctxH = texHome.getContext();
      ctxH.fillStyle = "#1976d2"; ctxH.fillRect(0,0,256,256);
      ctxH.fillStyle = "#0d47a1"; 
      for(let i=0; i<4; i++) { ctxH.fillRect(i*64, 0, 32, 256); }
      texHome.update();
      mats.jerseyHome = new StandardMaterial("jHome", scene); mats.jerseyHome.diffuseTexture = texHome;
      mats.pantsHome = new StandardMaterial("pHome", scene); mats.pantsHome.diffuseColor = new Color3(0.15, 0.15, 0.15);

      // 원정 유니폼 - 강렬한 레드 스트라이프 텍스처 생성
      const texAway = new DynamicTexture("texAway", {width:256, height:256}, scene);
      const ctxA = texAway.getContext();
      ctxA.fillStyle = "#d32f2f"; ctxA.fillRect(0,0,256,256);
      ctxA.fillStyle = "#b71c1c"; 
      for(let i=0; i<4; i++) { ctxA.fillRect(i*64, 0, 32, 256); }
      texAway.update();
      mats.jerseyAway = new StandardMaterial("jAway", scene); mats.jerseyAway.diffuseTexture = texAway;
      mats.pantsAway = new StandardMaterial("pAway", scene); mats.pantsAway.diffuseColor = new Color3(0.9, 0.9, 0.9);

      return mats;
    }

    // 디테일한 사람 형태(Humanoid Mesh) 구조 빌더
    function buildRealisticHumanoid(mesh, isHome, isGK, mats, scene) {
      const jerseyMat = isGK ? (isHome ? mats.gkHome : mats.gkAway) : (isHome ? mats.jerseyHome : mats.jerseyAway);
      const pantsMat = isHome ? mats.pantsHome : mats.pantsAway;

      // 전체 크기 스케일 업 적용
      mesh.scaling.set(PLAYER_SCALE, PLAYER_SCALE, PLAYER_SCALE);

      // 1. 몸통 (Torso)
      const torso = MeshBuilder.CreateCylinder("torso", { diameterTop: 0.6, diameterBottom: 0.4, height: 1.0, tessellation: 12 }, scene);
      torso.position.y = 1.4; torso.scaling.z = 0.75; torso.material = jerseyMat; torso.parent = mesh;

      // 2. 머리 (Head)와 얼굴 디테일
      const neck = MeshBuilder.CreateCylinder("neck", { diameter: 0.2, height: 0.15 }, scene); neck.position.y = 1.95; neck.material = mats.skin; neck.parent = mesh;
      const head = MeshBuilder.CreateSphere("head", { diameterX: 0.4, diameterY: 0.45, diameterZ: 0.4 }, scene); head.position.y = 2.25; head.material = mats.skin; head.parent = mesh;
      
      const hair = MeshBuilder.CreateSphere("hair", { diameter: 0.42 }, scene); hair.position.set(0, 2.35, -0.02); hair.scaling.set(1.02, 0.7, 1.05); hair.material = mats.hair; hair.parent = mesh;
      const eyeL = MeshBuilder.CreateSphere("eyeL", { diameter: 0.05 }, scene); eyeL.position.set(-0.08, 2.28, 0.18); eyeL.material = mats.eyes; eyeL.parent = mesh;
      const eyeR = eyeL.clone("eyeR"); eyeR.position.x = 0.08; eyeR.parent = mesh;

      // 3. 골반 및 하체 바지 (Pelvis & Shorts)
      const pelvis = MeshBuilder.CreateBox("pelvis", { width: 0.5, height: 0.3, depth: 0.35 }, scene); pelvis.position.y = 0.85; pelvis.material = pantsMat; pelvis.parent = mesh;

      // 4. 애니메이션 연동용 계층 구조 다리 파츠 구성
      const leftLegRoot = MeshBuilder.CreateBox("L_LegRoot", { size: 0.05 }, scene); leftLegRoot.position.set(-0.15, 0.7, 0); leftLegRoot.parent = mesh; leftLegRoot.isVisible = false;
      const leftThigh = MeshBuilder.CreateCylinder("L_Thigh", { diameterTop: 0.24, diameterBottom: 0.18, height: 0.45 }, scene); leftThigh.position.y = -0.22; leftThigh.material = pantsMat; leftThigh.parent = leftLegRoot;
      const leftCalf = MeshBuilder.CreateCylinder("L_Calf", { diameterTop: 0.16, diameterBottom: 0.12, height: 0.45 }, scene); leftCalf.position.y = -0.65; leftCalf.material = mats.socks; leftCalf.parent = leftLegRoot;
      const leftFoot = MeshBuilder.CreateBox("L_Foot", { width: 0.14, height: 0.1, depth: 0.28 }, scene); leftFoot.position.set(0, -0.9, 0.06); leftFoot.material = mats.boots; leftFoot.parent = leftLegRoot;

      const rightLegRoot = MeshBuilder.CreateBox("R_LegRoot", { size: 0.05 }, scene); rightLegRoot.position.set(0.15, 0.7, 0); rightLegRoot.parent = mesh; rightLegRoot.isVisible = false;
      const rightThigh = leftThigh.clone("R_Thigh"); rightThigh.parent = rightLegRoot;
      const rightCalf = leftCalf.clone("R_Calf"); rightCalf.parent = rightLegRoot;
      const rightFoot = leftFoot.clone("R_Foot"); rightFoot.parent = rightLegRoot;

      // 5. 어깨 및 양팔 파츠 구성
      const leftArmRoot = MeshBuilder.CreateBox("L_ArmRoot", { size: 0.05 }, scene); leftArmRoot.position.set(-0.35, 1.7, 0); leftArmRoot.parent = mesh; leftArmRoot.isVisible = false;
      const leftArm = MeshBuilder.CreateCylinder("L_Arm", { diameterTop: 0.14, diameterBottom: 0.11, height: 0.6 }, scene); leftArm.position.y = -0.25; leftArm.material = jerseyMat; leftArm.parent = leftArmRoot;
      const leftHand = MeshBuilder.CreateSphere("L_Hand", { diameter: 0.11 }, scene); leftHand.position.y = -0.58; leftHand.material = mats.skin; leftHand.parent = leftArmRoot;

      const rightArmRoot = MeshBuilder.CreateBox("R_ArmRoot", { size: 0.05 }, scene); rightArmRoot.position.set(0.35, 1.7, 0); rightArmRoot.parent = mesh; rightArmRoot.isVisible = false;
      const rightArm = leftArm.clone("R_Arm"); rightArm.parent = rightArmRoot;
      const rightHand = leftHand.clone("R_Hand"); rightHand.parent = rightArmRoot;

      return { leftLegRoot, rightLegRoot, leftArmRoot, rightArmRoot, torso };
    }

    // ==========================================
    // 1. Player 클래스 (유저 제어)
    // ==========================================
    class Player {
      constructor(scene, mats) {
        this.scene = scene;
        this.mats = mats;
        this.team = "home";
        
        // 현실적인 움직임을 위한 하향 조정된 전술 속도 밸런싱
        this.minSpeed = 0.16;     
        this.maxSpeed = 0.32;     
        this.currentSpeed = 0.16;  
        this.acceleration = 0.008; 
        
        this.inputMap = {};
        this.hasBall = false;
        this.moveDirection = new Vector3(0, 0, 1);
        
        this.mesh = MeshBuilder.CreateBox("playerRoot", { size: 0.1 }, this.scene);
        this.mesh.isVisible = false;
        this.anims = buildRealisticHumanoid(this.mesh, true, false, this.mats, this.scene);
        
        this.setupInput();
        this.resetPosition();
      }

      resetPosition() {
        this.mesh.position.set(0, 0, -45); 
        this.moveDirection.set(0, 0, 1); 
        this.mesh.rotation.y = 0;
        this.currentSpeed = this.minSpeed;
        this.hasBall = false;
      }

      setupInput() {
        this.scene.onKeyboardObservable.add((kbInfo) => {
          const key = kbInfo.event.key.toLowerCase();
          if (kbInfo.type === BABYLON.KeyboardEventTypes.KEYDOWN) {
            this.inputMap[key] = true;
            if (key === 's' && this.hasBall && gameInstance) gameInstance.executePassSystem(this);
            if (key === ' ' && !this.hasBall && gameInstance) gameInstance.executeUserTackle();
            if (key === 'd' && this.hasBall && gameInstance) {
              gameInstance.isChargingShoot = true;
              document.getElementById("power-bar-container").style.display = "block";
            }
          } else if (kbInfo.type === BABYLON.KeyboardEventTypes.KEYUP) {
            this.inputMap[key] = false;
            if (key === 'd' && gameInstance && gameInstance.isChargingShoot) gameInstance.executeUserShoot();
          }
        });
      }

      update(fieldWidth, fieldHeight) {
        let moveX = 0; let moveZ = 0;
        if (this.inputMap["arrowup"])    moveZ += 1; 
        if (this.inputMap["arrowdown"])  moveZ -= 1; 
        if (this.inputMap["arrowleft"])  moveX -= 1; 
        if (this.inputMap["arrowright"]) moveX += 1; 

        const isMoving = (moveX !== 0 || moveZ !== 0);

        if (this.inputMap["e"] && isMoving) {
          this.currentSpeed = Math.min(this.maxSpeed, this.currentSpeed + this.acceleration);
        } else {
          this.currentSpeed = Math.max(this.minSpeed, this.currentSpeed - this.acceleration * 2.0);
        }

        if (isMoving) {
          const inputDir = new Vector3(moveX, 0, moveZ).normalize();
          this.mesh.position.addInPlace(inputDir.scale(this.currentSpeed));
          this.moveDirection.copyFrom(inputDir);
          this.mesh.rotation.y = Math.atan2(inputDir.x, inputDir.z);

          // 다이나믹 사람 형태 관절 주행 애니메이션
          const time = performance.now() * this.currentSpeed * 0.15;
          this.anims.leftLegRoot.rotation.x = Math.sin(time) * 0.7;
          this.anims.rightLegRoot.rotation.x = -Math.sin(time) * 0.7;
          this.anims.leftArmRoot.rotation.x = -Math.sin(time) * 0.5;
          this.anims.rightArmRoot.rotation.x = Math.sin(time) * 0.5;
          this.anims.torso.rotation.x = 0.1;
        } else {
          this.anims.leftLegRoot.rotation.x = 0; this.anims.rightLegRoot.rotation.x = 0;
          this.anims.leftArmRoot.rotation.x = 0; this.anims.rightArmRoot.rotation.x = 0;
          this.anims.torso.rotation.x = 0;
        }

        const limitX = (fieldWidth / 2) - 2.5; const limitZ = (fieldHeight / 2) - 2.5;
        this.mesh.position.x = Math.max(-limitX, Math.min(limitX, this.mesh.position.x));
        this.mesh.position.z = Math.max(-limitZ, Math.min(limitZ, this.mesh.position.z));
      }
    }

    // ==========================================
    // 2. DummyPlayer 클래스 (전술형 대형 AI)
    // ==========================================
    class DummyPlayer {
      constructor(name, team, role, position, scene, mats) {
        this.name = name;
        this.team = team;
        this.role = role; 
        this.initialPos = position.clone(); 
        this.targetPos = position.clone();
        this.scene = scene;
        this.mats = mats;
        
        // 현실적 경기 흐름을 위해 속도 체감 하향 조정
        this.baseSpeed = 0.13;
        this.dashSpeed = 0.22; 
        this.gkSpeed = 0.18; 
        this.hasBall = false;
        this.zoneRadius = 65.0; 

        this.moveDirection = new Vector3(0, 0, (this.team === "home") ? 1 : -1);
        this.decisionTimer = Math.random() * 30;

        this.mesh = MeshBuilder.CreateBox(this.name + "Root", { size: 0.1 }, this.scene);
        this.mesh.isVisible = false;
        this.mesh.position.copyFrom(this.initialPos);
        
        const isHome = (this.team === "home");
        const isGK = (this.role === "GK");
        this.anims = buildRealisticHumanoid(this.mesh, isHome, isGK, this.mats, this.scene);
        this.mesh.rotation.y = isHome ? 0 : Math.PI;
      }

      updateAI(playerObj, ball, fieldHeight, isClosestDefender, onTackleSuccess) {
        if (this.role === "GK") {
          this.updateGKLogic(playerObj, ball, fieldHeight, onTackleSuccess);
        } else {
          this.updateTacticalLogic(playerObj, ball, isClosestDefender, onTackleSuccess);
        }
      }

      updateGKLogic(playerObj, ball, fieldHeight, onTackleSuccess) {
        const ballPos = ball.position;
        const isAwayGK = (this.team === "away");
        const boxMinX = -PENALTY_BOX_W / 2 + 5.0; const boxMaxX = PENALTY_BOX_W / 2 - 5.0;
        const boxZCenter = isAwayGK ? (fieldHeight / 2) : -(fieldHeight / 2);
        const boxMinZ = isAwayGK ? (fieldHeight / 2 - PENALTY_BOX_D) : -(fieldHeight / 2);
        const boxMaxZ = isAwayGK ? (fieldHeight / 2) : -(fieldHeight / 2 + PENALTY_BOX_D);

        let targetX = ballPos.x;
        let targetZ = isAwayGK ? (boxZCenter - 6.0) : (boxZCenter + 6.0);
        const isInBox = isAwayGK ? (ballPos.z > boxMinZ) : (ballPos.z < boxMaxZ);
        if (isInBox) { targetX = ballPos.x; targetZ = ballPos.z; }

        this.targetPos.x = Math.max(boxMinX, Math.min(boxMaxX, targetX));
        this.targetPos.z = isAwayGK ? Math.max(boxMinZ, Math.min(boxMaxZ, targetZ)) : Math.min(boxMinZ, Math.max(boxMaxZ, targetZ));

        const moveVec = this.targetPos.subtract(this.mesh.position);
        let speed = isInBox ? this.dashSpeed : this.gkSpeed;

        if (moveVec.length() > 0.3) {
          moveVec.normalize(); this.mesh.position.addInPlace(moveVec.scale(speed));
          this.mesh.rotation.y = Math.atan2(moveVec.x, moveVec.z);
          this.moveDirection.copyFrom(moveVec);
        } else {
          const lookVec = ballPos.subtract(this.mesh.position); this.mesh.rotation.y = Math.atan2(lookVec.x, lookVec.z);
        }

        if (Vector3.Distance(this.mesh.position, ballPos) < 5.0 && !this.hasBall && !playerObj.hasBall) {
          if (Math.random() < 0.25) onTackleSuccess(this);
        }
      }

      updateTacticalLogic(playerObj, ball, isClosestDefender, onTackleSuccess) {
        const ballPos = ball.position;
        const playerPos = playerObj.mesh.position;
        
        if (this.hasBall) {
          this.decisionTimer++;
          const targetGoalZ = (this.team === "away") ? -160 : 160;
          const enemyGoalPos = new Vector3(0, BALL_RADIUS, targetGoalZ);
          const distToGoal = Vector3.Distance(this.mesh.position, enemyGoalPos);

          if (distToGoal < 75.0 && this.decisionTimer > 30) {
            this.decisionTimer = 0;
            const shootDir = enemyGoalPos.subtract(this.mesh.position).normalize();
            if (gameInstance) {
              gameInstance.ballVelocity.copyFrom(shootDir.scale(5.5));
              gameInstance.ballVelocity.y = 0.6; this.hasBall = false;
            }
            return;
          }

          if (this.decisionTimer > 55 && gameInstance && Math.random() < 0.45) {
            this.decisionTimer = 0;
            if (gameInstance.executePassSystem(this)) return;
          }

          const dribbleDir = enemyGoalPos.subtract(this.mesh.position).normalize();
          dribbleDir.x += Math.sin(performance.now() * 0.003) * 0.25; dribbleDir.normalize();
          this.mesh.position.addInPlace(dribbleDir.scale(this.baseSpeed * 1.15));
          this.mesh.rotation.y = Math.atan2(dribbleDir.x, dribbleDir.z);
          this.moveDirection.copyFrom(dribbleDir);
          return;
        }

        let teamHasBall = gameInstance ? gameInstance.dummies.some(d => d.team === this.team && d.hasBall) : false;
        if (teamHasBall) {
          let supportTarget = this.initialPos.clone();
          supportTarget.z += (this.team === "away") ? -55.0 : 55.0;
          const moveVec = supportTarget.subtract(this.mesh.position);
          if (moveVec.length() > 3.0) {
            moveVec.normalize(); this.mesh.position.addInPlace(moveVec.scale(this.baseSpeed));
            this.mesh.rotation.y = Math.atan2(moveVec.x, moveVec.z);
            this.moveDirection.copyFrom(moveVec);
          }
          return;
        }

        const distFromBaseToBall = Vector3.Distance(this.initialPos, ballPos);
        const trackTargetPos = playerObj.hasBall ? playerPos : ballPos;

        let currentMoveSpeed = this.baseSpeed;
        if (distFromBaseToBall < this.zoneRadius || isClosestDefender) {
          currentMoveSpeed = isClosestDefender ? this.dashSpeed : this.baseSpeed;
          if (isClosestDefender) {
            const leadTime = Vector3.Distance(this.mesh.position, trackTargetPos) * 0.05;
            const interceptOffset = playerObj.hasBall ? playerObj.moveDirection.scale(playerObj.currentSpeed * leadTime * 8) : new Vector3(0,0,0);
            this.targetPos.copyFrom(trackTargetPos.add(interceptOffset));
          } else {
            this.targetPos.copyFrom(trackTargetPos.add(new Vector3(this.initialPos.x * 0.15, 0, (this.team === "away") ? 8.0 : -8.0)));
          }
        } else {
          this.targetPos.copyFrom(this.initialPos);
        }

        const moveVec = this.targetPos.subtract(this.mesh.position);
        if (moveVec.length() > 1.0) {
          moveVec.normalize(); this.mesh.position.addInPlace(moveVec.scale(currentMoveSpeed));
          this.mesh.rotation.y = Math.atan2(moveVec.x, moveVec.z);
          this.moveDirection.copyFrom(moveVec);

          const time = performance.now() * currentMoveSpeed * 0.15;
          this.anims.leftLegRoot.rotation.x = Math.sin(time) * 0.6; this.anims.rightLegRoot.rotation.x = -Math.sin(time) * 0.6;
        } else {
          this.anims.leftLegRoot.rotation.x = 0; this.anims.rightLegRoot.rotation.x = 0;
          const lookVec = ballPos.subtract(this.mesh.position); this.mesh.rotation.y = Math.atan2(lookVec.x, lookVec.z);
        }

        if (this.team === "away" && Vector3.Distance(this.mesh.position, playerPos) < 4.0 && playerObj.hasBall) {
          if (Math.random() < 0.018) onTackleSuccess(this);
        }
      }
    }

    // ==========================================
    // 3. Game 클래스 (엔진 메인 코어)
    // ==========================================
    class Game {
      constructor(canvas) {
        this.canvas = canvas;
        this.engine = new Engine(this.canvas, true);
        this.scene = new Scene(this.engine);
        
        this.fieldWidth = 240; this.fieldHeight = 340;
        this.ballVelocity = new Vector3(0, 0, 0);
        this.friction = 0.985; this.gravity = 0.06; this.isResetting = false;
        this.scoreHome = 0; this.scoreAway = 0; 
        
        this.shootPowerMax = 9.0; this.shootPowerCurrent = 1.0; this.isChargingShoot = false;
        this.cameraShakeIntensity = 0;
        this.dummies = [];

        this.mats = createHumanMaterials(this.scene);

        this.initScene();
        this.createProceduralGrassField();
        this.createGKZoneBoxes(); 
        this.createRealGoals();
        this.createBall();
        this.player = new Player(this.scene, this.mats);
        this.spawnFormationDummies();
        this.setupMainLoop();

        gameInstance = this;
      }

      initScene() {
        this.scene.clearColor = new Color3(0.53, 0.81, 0.92);
        this.camera = new FreeCamera("mainTacticalCamera", new Vector3(120, 80, 0), this.scene);
        this.camera.setTarget(new Vector3(0, 0, 0)); 
        this.light = new HemisphericLight("skyLight", new Vector3(0, 1, 0), this.scene); this.light.intensity = 0.75;
        const sunLight = new DirectionalLight("sunLight", new Vector3(-1, -2, -0.4), this.scene); sunLight.intensity = 0.95;
      }

      createGKZoneBoxes() {
        const zoneMat = new StandardMaterial("gkZoneMat", this.scene); zoneMat.diffuseColor = new Color3(1, 0.3, 0); zoneMat.alpha = 0.015; 
        this.awayGKBox = MeshBuilder.CreateBox("awayGKBox", { width: PENALTY_BOX_W, height: 0.1, depth: PENALTY_BOX_D }, this.scene);
        this.awayGKBox.position.set(0, 0.05, (this.fieldHeight / 2) - (PENALTY_BOX_D / 2)); this.awayGKBox.material = zoneMat;
      }

      spawnFormationDummies() {
        const homePositions = [
          { role: "GK", coords: new Vector3(0, 0, -160) }, 
          { role: "FIELD", coords: new Vector3(-75, 0, -100) }, { role: "FIELD", coords: new Vector3(-25, 0, -110) },
          { role: "FIELD", coords: new Vector3(25, 0, -110) }, { role: "FIELD", coords: new Vector3(75, 0, -100) }, 
          { role: "FIELD", coords: new Vector3(-35, 0, -50) }, { role: "FIELD", coords: new Vector3(35, 0, -50) }, 
          { role: "FIELD", coords: new Vector3(-65, 0, -10) }, { role: "FIELD", coords: new Vector3(0, 0, -15) }, { role: "FIELD", coords: new Vector3(65, 0, -10) }
        ];
        const awayPositions = [
          { role: "GK", coords: new Vector3(0, 0, 160) }, 
          { role: "FIELD", coords: new Vector3(75, 0, 100) }, { role: "FIELD", coords: new Vector3(25, 0, 110) },
          { role: "FIELD", coords: new Vector3(-25, 0, 110) }, { role: "FIELD", coords: new Vector3(-75, 0, 100) }, 
          { role: "FIELD", coords: new Vector3(35, 0, 50) }, { role: "FIELD", coords: new Vector3(-35, 0, 50) }, 
          { role: "FIELD", coords: new Vector3(60, 0, 20) }, { role: "FIELD", coords: new Vector3(0, 0, 25) }, { role: "FIELD", coords: new Vector3(-60, 0, 20) },
          { role: "FIELD", coords: new Vector3(0, 0, 5) }   
        ];
        homePositions.forEach((p, idx) => { this.dummies.push(new DummyPlayer(`Home_${p.role}_${idx}`, "home", p.role, p.coords, this.scene, this.mats)); });
        awayPositions.forEach((p, idx) => { this.dummies.push(new DummyPlayer(`Away_${p.role}_${idx}`, "away", p.role, p.coords, this.scene, this.mats)); });
      }

      updateCameraFollow() {
        if (!this.player || !this.player.mesh) return;
        const playerPos = this.player.mesh.position;
        let targetCameraX = playerPos.x + 110; let targetCameraZ = playerPos.z;      
        
        if (this.cameraShakeIntensity > 0.05) {
          targetCameraX += BABYLON.Scalar.RandomRange(-this.cameraShakeIntensity, this.cameraShakeIntensity) * 12;
          targetCameraZ += BABYLON.Scalar.RandomRange(-this.cameraShakeIntensity, this.cameraShakeIntensity) * 12;
          this.cameraShakeIntensity *= 0.92; 
        }
        this.camera.position.x = BABYLON.Scalar.Lerp(this.camera.position.x, targetCameraX, 0.06);
        this.camera.position.z = BABYLON.Scalar.Lerp(this.camera.position.z, targetCameraZ, 0.06);
        this.camera.position.y = BABYLON.Scalar.Lerp(this.camera.position.y, 75, 0.06);
        this.camera.setTarget(new Vector3(playerPos.x, playerPos.y + 3.0, playerPos.z));
      }

      createProceduralGrassField() {
        const grassTexture = new DynamicTexture("grassTex", {width: 1024, height: 1024}, this.scene); const ctx = grassTexture.getContext();
        for (let i = 0; i < 20; i++) { ctx.fillStyle = (i % 2 === 0) ? "#2e7d32" : "#388e3c"; ctx.fillRect(0, i * (1024/20), 1024, (1024/20)); }
        ctx.strokeStyle = "rgba(255,255,255,0.85)"; ctx.lineWidth = 10; ctx.strokeRect(15, 15, 1024 - 30, 1024 - 30);
        ctx.beginPath(); ctx.moveTo(15, 512); ctx.lineTo(1024-15, 512); ctx.stroke();
        ctx.beginPath(); ctx.arc(512, 512, 120, 0, 2 * Math.PI); ctx.stroke(); grassTexture.update();
        const field = MeshBuilder.CreateGround("soccerField", { width: this.fieldWidth, height: this.fieldHeight }, this.scene);
        const fieldMat = new StandardMaterial("fieldMat", this.scene); fieldMat.diffuseTexture = grassTexture; field.material = fieldMat;
      }

      createRealGoals() {
        this.goalW = 46; this.goalH = 13.0; this.goalD = 8.0; 
        this.createNetStructure(0, this.fieldHeight/2, this.goalW, this.goalH, this.goalD);  
        this.createNetStructure(0, -this.fieldHeight/2, this.goalW, this.goalH, this.goalD); 
      }

      createNetStructure(x, z, w, h, d) {
        const whiteMat = new StandardMaterial("whiteMat", this.scene); whiteMat.diffuseColor = new Color3(0.95, 0.95, 0.95);
        const leftPost = MeshBuilder.CreateCylinder("postL", { height: h, diameter: 0.8 }, this.scene); leftPost.position.set(x - w/2, h/2, z); leftPost.material = whiteMat;
        const rightPost = MeshBuilder.CreateCylinder("postR", { height: h, diameter: 0.8 }, this.scene); rightPost.position.set(x + w/2, h/2, z); rightPost.material = whiteMat;
        const topBar = MeshBuilder.CreateCylinder("barT", { height: w, diameter: 0.8 }, this.scene); topBar.position.set(x, h, z); topBar.rotation.z = Math.PI / 2; topBar.material = whiteMat;
      }

      createBall() {
        this.ball = MeshBuilder.CreateSphere("soccerBall", { diameter: BALL_RADIUS * 2 }, this.scene); this.resetBall();
        const ballMat = new StandardMaterial("ballMat", this.scene); ballMat.diffuseColor = new Color3(1, 1, 1); this.ball.material = ballMat;
      }

      resetBall() { this.ball.position.set(0, BALL_RADIUS, 0); this.ballVelocity.set(0, 0, 0); }

      triggerGoal(isAwayGoal) {
        if (this.isResetting) return; this.isResetting = true; 
        this.player.hasBall = false; this.dummies.forEach(d => d.hasBall = false);
        if (isAwayGoal) { this.scoreHome++; document.getElementById("score-home").innerText = this.scoreHome; }
        else { this.scoreAway++; document.getElementById("score-away").innerText = this.scoreAway; }
        const overlay = document.getElementById("goal-overlay"); overlay.style.display = "block";
        this.cameraShakeIntensity = 2.2;
        setTimeout(() => { this.resetBall(); this.player.resetPosition(); overlay.style.display = "none"; this.isResetting = false; }, 2000);
      }

      executePassSystem(passer) {
        let potentialTargets = (passer === this.player) ? this.dummies.filter(d => d.team === "home") : this.dummies.filter(d => d.team === passer.team && d !== passer && d.role !== "GK");
        if (potentialTargets.length === 0) return false;

        let bestTarget = null; let minAngleDifference = Infinity;
        const passerForward = passer.moveDirection.normalize();

        potentialTargets.forEach(target => {
          const toTargetVec = target.mesh.position.subtract(passer.mesh.position); toTargetVec.y = 0;
          const distance = toTargetVec.length();
          if (distance > 4.0 && distance < 120.0) {
            toTargetVec.normalize();
            const dotProduct = Vector3.Dot(passerForward, toTargetVec);
            const angleDiff = Math.acos(BABYLON.Scalar.Clamp(dotProduct, -1, 1));
            if (angleDiff < minAngleDifference && angleDiff < Math.PI / 3) {
              minAngleDifference = angleDiff; bestTarget = target;
            }
          }
        });

        if (bestTarget) {
          const passDir = bestTarget.mesh.position.subtract(passer.mesh.position).normalize();
          this.ballVelocity.copyFrom(passDir.scale(4.8)); passer.hasBall = false;
          return true;
        }
        return false;
      }

      executeUserShoot() {
        this.isChargingShoot = false; document.getElementById("power-bar-container").style.display = "none";
        const enemyGoalPos = new Vector3(0, BALL_RADIUS, 160);
        const shootDir = enemyGoalPos.subtract(this.player.mesh.position).normalize();
        const finalPower = Math.min(this.shootPowerMax, this.shootPowerCurrent);
        this.ballVelocity.copyFrom(shootDir.scale(finalPower)); this.ballVelocity.y = finalPower * 0.15;
        this.player.hasBall = false; this.shootPowerCurrent = 1.0;
      }

      executeUserTackle() {
        const awayPlayers = this.dummies.filter(d => d.team === "away" && d.hasBall);
        if(awayPlayers.length > 0) {
          const targetAI = awayPlayers[0];
          if(Vector3.Distance(this.player.mesh.position, targetAI.mesh.position) < 6.0) {
            if(Math.random() < 0.65) { targetAI.hasBall = false; this.player.hasBall = true; }
          }
        }
      }

      setupMainLoop() {
        this.engine.runRenderLoop(() => {
          this.player.update(this.fieldWidth, this.fieldHeight);

          if (this.isChargingShoot) {
            this.shootPowerCurrent += 0.22;
            const percentage = Math.min(100, (this.shootPowerCurrent / this.shootPowerMax) * 100);
            document.getElementById("power-bar").style.width = percentage + "%";
          }

          let closestAwayDefender = null; let minAwayDist = Infinity;
          this.dummies.forEach(d => {
            if (d.team === "away") {
              const dist = Vector3.Distance(d.mesh.position, this.ball.position);
              if (dist < minAwayDist) { minAwayDist = dist; closestAwayDefender = d; }
            }
          });

          this.dummies.forEach(d => {
            d.updateAI(this.player, this.ball, this.fieldHeight, (d === closestAwayDefender), (tackler) => {
              this.player.hasBall = false; this.dummies.forEach(dm => dm.hasBall = false); tackler.hasBall = true;
            });
          });

          let possessor = this.player.hasBall ? this.player : this.dummies.find(d => d.hasBall);
          if (possessor) {
            const forwardOffset = possessor.moveDirection.normalize().scale(2.2);
            const targetBallPos = possessor.mesh.position.add(forwardOffset); targetBallPos.y = BALL_RADIUS;
            this.ball.position.copyFrom(targetBallPos); this.ballVelocity.set(0, 0, 0);
          } else {
            this.ballVelocity.x *= this.friction; this.ballVelocity.z *= this.friction;
            if (this.ball.position.y > BALL_RADIUS) this.ballVelocity.y -= this.gravity;
            this.ball.position.addInPlace(this.ballVelocity);

            if (this.ball.position.y < BALL_RADIUS) { this.ball.position.y = BALL_RADIUS; this.ballVelocity.y = -this.ballVelocity.y * 0.35; }

            if (Vector3.Distance(this.player.mesh.position, this.ball.position) < 3.8 && !this.isResetting) {
              this.player.hasBall = true;
            } else {
              for (let d of this.dummies) {
                if (Vector3.Distance(d.mesh.position, this.ball.position) < 3.8 && !this.isResetting) { d.hasBall = true; break; }
              }
            }
          }

          const halfW = this.fieldWidth / 2; const halfH = this.fieldHeight / 2;
          if (Math.abs(this.ball.position.x) > halfW) { this.ballVelocity.x *= -0.8; this.ball.position.x = Math.sign(this.ball.position.x) * halfW; }

          if (Math.abs(this.ball.position.z) > halfH) {
            if (Math.abs(this.ball.position.x) < this.goalW / 2 && this.ball.position.y <= this.goalH) {
              this.triggerGoal(this.ball.position.z > 0);
            } else {
              this.ballVelocity.z *= -0.8; this.ball.position.z = Math.sign(this.ball.position.z) * halfH;
            }
          }

          this.updateCameraFollow();
          this.scene.render();
        });
        window.addEventListener("resize", () => { this.engine.resize(); });
      }
    }

    // 파일 로드 즉시 실행 안전 보장
    window.addEventListener('DOMContentLoaded', () => { 
      new Game(document.getElementById('renderCanvas')); 
    });
  </script>
